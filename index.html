<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tes Tipe Orang + Quotes</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Caveat:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Nunito', sans-serif; }
body {
  background: linear-gradient(135deg, #ffe4e6 0%, #dbeafe 50%, #fef3c7 100%);
  min-height: 100vh; padding: 20px; display: flex; justify-content: center; align-items: center;
}
.container {
  background: #fffdf5; width: 100%; max-width: 600px; padding: 30px;
  border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.15);
  border: 4px dashed #fbbf24; animation: float 3s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform: translateY(0);} 50%{transform: translateY(-8px);} }

.disclaimer {
  background: #fef3c7; border: 2px dashed #f59e0b; padding: 12px; border-radius: 15px;
  text-align: center; font-size: 12px; color: #92400e; margin-bottom: 15px; font-weight: 700;
}

.title {
  font-family: 'Caveat', cursive; font-size: 36px; color: #ec4899;
  text-align: center; margin-bottom: 5px;
}
.subtitle { text-align: center; color: #64748b; margin-bottom: 20px; font-size: 13px; }

.input-name { display: flex; gap: 10px; margin-bottom: 20px; }
.input-name input {
  flex: 1; padding: 12px; border: 3px solid #fbbf24; border-radius: 15px; font-weight: 700;
}

.progress-bar {
  background: #ffe4e6; height: 14px; border-radius: 20px; margin-bottom: 25px; overflow: hidden;
  border: 3px solid #fca5a5;
}
.progress {
  background: linear-gradient(90deg, #f472b6, #a78bfa); height: 100%;
  border-radius: 20px; transition: 0.4s; width: 0%;
}

.question-text { font-size: 20px; font-weight: 900; color: #1e3a8a; margin-bottom: 20px; text-align: center; }

.option {
  background: #fff; padding: 16px; border-radius: 18px; margin-bottom: 12px;
  cursor: pointer; border: 3px solid #dbeafe; font-weight: 700; color: #1e40af;
  box-shadow: 0 4px 0 #bfdbfe; transition: 0.2s;
}
.option:hover { transform: translateX(8px); background: #eff6ff; }
.option.selected {
  background: linear-gradient(135deg, #f472b6, #a78bfa); color: white;
  border-color: #ec4899; animation: wiggle 0.3s;
}
@keyframes wiggle { 25%{transform: rotate(-2deg);} 75%{transform: rotate(2deg);} }

.btn-next {
  background: linear-gradient(135deg, #f472b6, #ec4899); color: white; border: none; padding: 16px;
  border-radius: 20px; font-weight: 900; cursor: pointer; font-size: 16px; width: 100%; margin-top: 15px;
  box-shadow: 0 6px 0 #be185d;
}
.btn-next:disabled { background: #cbd5e1; box-shadow: 0 6px 0 #94a3b8; }

/* HASIL */
.result-box { display: none; text-align: center; }
.result-box.active { display: block; animation: pop 0.6s; }
@keyframes pop { 60%{transform: scale(1.05);} }

.character {
  width: 160px; height: 160px; margin: 0 auto 15px;
  background: linear-gradient(135deg, #f472b6, #a78bfa);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 70px; border: 5px solid white; box-shadow: 0 8px 0 #be185d;
  animation: bounce 1s infinite;
}
@keyframes bounce { 0%,100%{transform: translateY(0);} 50%{transform: translateY(-15px);} }

.result-type {
  font-family: 'Caveat', cursive; font-size: 48px; font-weight: 700;
  background: linear-gradient(135deg, #ec4899, #8b5cf6);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.card {
  background: white; padding: 18px; border-radius: 20px; margin: 15px 0;
  border: 3px solid #dbeafe; box-shadow: 0 4px 0 #bfdbfe; text-align: left;
}
.card h3 { color: #1e40af; margin-bottom: 8px; font-weight: 900; }

.quote-box {
  background: linear-gradient(135deg, #ddd6fe, #fbcfe8);
  border: 3px dashed #a78bfa; text-align: center; font-style: italic;
}
.quote-text { font-family: 'Caveat', cursive; font-size: 20px; color: #6d28d9; }

.btn-share {
  background: #25D366; color: white; border: none; padding: 14px; border-radius: 20px;
  font-weight: 900; cursor: pointer; font-size: 15px; width: 100%; margin-top: 10px;
}
.btn-restart {
  background: #8b5cf6; color: white; border: none; padding: 14px; border-radius: 20px;
  font-weight: 900; cursor: pointer; font-size: 15px; width: 100%; margin-top: 10px;
}

.confetti {
  position: fixed; width: 10px; height: 10px; position: absolute;
  animation: fall 3s linear forwards; z-index: 9999;
}
@keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
</style>
</head>
<body>

<div class="container">
  <div class="disclaimer">
    ⚠️ NOTE: Ini cuma buat seru-seruan aja ya! Bukan tes psikologi beneran 😆
  </div>

  <h1 class="title">Tes 3 Soal Doang ✨</h1>
  <p class="subtitle">Cuma 30 detik + dapet quotes hari ini!</p>

  <div class="input-name">
    <input type="text" id="userName" placeholder="Nama kamu">
  </div>

  <div class="progress-bar"><div class="progress" id="progress"></div></div>
  <div id="quizArea"></div>

  <div class="result-box" id="resultBox">
    <div class="character" id="character">📚</div>
    <h2 class="result-type" id="resultType">INTP</h2>
    <h3 id="resultName">The Thinker</h3>
    <div id="resultZodiak" style="background: #fbbf24; color:white; padding:8px 16px; border-radius:20px; display:inline-block; margin:10px 0; font-weight:900;">♒ Aquarius</div>

    <div class="card"><h3>👤 Tipe Kamu Tu Begini</h3><p id="resultDesc"></p></div>

    <div class="card quote-box">
      <h3>💌 Kata-Kata Hari Ini Buat Kamu</h3>
      <p class="quote-text" id="quoteText"></p>
    </div>

    <div class="card"><h3>✨ Sifat Utama</h3><p id="resultTrait"></p></div>
    <div class="card" style="background: #fef3c7; border-color: #f59e0b;"><h3>💡 Tips Buat Kamu</h3><p id="resultTips"></p></div>

    <button class="btn-share" onclick="shareWA()">📤 Share Quotes ke Temen</button>
    <button class="btn-restart" onclick="restartQuiz()">Tes Lagi 🔄</button>
  </div>
</div>

<script>
// CUMA 3 SOAL
const questions = [
  {q: "Di akhir pekan kamu lebih suka...", a: [{t:"Nongkrong rame-rame", v:"E"}, {t:"Diam di rumah rebahan", v:"I"}]},
  {q: "Kalau ambil keputusan...", a: [{t:"Pakai logika dan fakta", v:"T"}, {t:"Pakai perasaan", v:"F"}]},
  {q: "Gaya kerja kamu...", a: [{t:"Rapi, ada jadwal, to do list", v:"J"}, {t:"Santai, ngalir aja", v:"P"}]},
];

// 8 HASIL + QUOTES KHUS TIAP TIPE
const types = {
  "ETJ":{emoji:"👑",name:"The Boss",desc:"[NAMA] tuh pemimpin alami! Tegas, rapi, dan suka ngatur.",trait:"Tegas • Terorganisir • Ambisius",tips:"Jangan lupa dengerin pendapat orang juga [NAMA] 😆",quote:"Hari ini saatnya kamu pimpin, bukan dipimpin. Gas terus!"},
  "ETP":{emoji:"⚡",name:"The Action",desc:"[NAMA] tuh sat set sat set! Suka tantangan dan gak bisa diem.",trait:"Pemberani • Spontan • Energik",tips:"Bikin rencana dikit biar gak kelelahan [NAMA]",quote:"Stop mikir, mulai jalan. Hari ini milik kamu yang berani!"},
  "EFJ":{emoji:"🌟",name:"The Care",desc:"[NAMA] tuh perhatian banget! Suka ngumpul dan jagain semua orang.",trait:"Peduli • Sosial • Hangat",tips:"Kamu juga butuh di care-in [NAMA] 💖",quote:"Kebaikan kamu hari ini akan kembali 10x lipat. Tebar vibes positif!"},
  "EFP":{emoji:"🎉",name:"The Party",desc:"[NAMA] tuh pusat perhatian! Ceria dan bikin suasana hidup.",trait:"Ceria • Kreatif • Ramah",tips:"Salurin energi ke hal positif [NAMA]!",quote:"Tertawa hari ini = obat gratis. Jangan lupa bahagia ya!"},
  "ITJ":{emoji:"🧠",name:"The Thinker",desc:"[NAMA] tuh otak jalan terus. Suka rencana dan kerja sendiri.",trait:"Logis • Mandiri • Fokus",tips:"Jangan kelamaan di kamar [NAMA], keluar juga 😂",quote:"Ide besar kamu hari ini bisa ubah besok. Tulis sekarang!"},
  "ITP":{emoji:"📚",name:"The Chill",desc:"[NAMA] tuh kalem tapi jago. Suka ngulik hal baru sendirian.",trait:"Penasaran • Santai • Inovatif",tips:"Share ilmu kamu ke orang [NAMA]!",quote:"Hari yang tenang = hari yang produktif. Nikmati prosesnya."},
  "IFJ":{emoji:"🏠",name:"The Protector",desc:"[NAMA] tuh lembut dan perhatian. Rumah = tempat paling nyaman.",trait:"Empati • Loyal • Lembut",tips:"Jaga batasan ya [NAMA], jangan kebanyakan ngalah.",quote:"Hati kamu yang lembut itu kekuatan, bukan kelemahan. Hari ini istirahat ya."},
  "IFP":{emoji:"🎨",name:"The Dreamer",desc:"[NAMA] tuh pemimpi dan punya hati emas. Suka hal indah.",trait:"Kreatif • Sensitif • Idealisme",tips:"Tunjukin karya kamu ke dunia [NAMA]!",quote:"Jangan padamkan mimpimu karena omongan orang. Hari ini berkarya!"},
};

let currentQ = 0, answers = {E:0,I:0,T:0,F:0,J:0,P:0}, selectedAnswer = null;

function createConfetti() {
  for(let i=0; i<40; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100 + '%';
    c.style.background = ['#f472b6','#a78bfa','#60a5fa','#fbbf24'][Math.floor(Math.random()*4)];
    c.style.animationDelay = Math.random()*0.5 + 's';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3000);
  }
}

function renderQuestion() {
  const q = questions[currentQ];
  document.getElementById('progress').style.width = ((currentQ + 1) / questions.length) * 100 + '%';
  document.getElementById('quizArea').innerHTML = `
    <div><h3 style="text-align:center; color:#64748b;">Soal ${currentQ + 1} / 3</h3>
    <div class="question-text">${q.q}</div>
    ${q.a.map((opt, i) => `<div class="option" onclick="selectOption('${opt.v}', ${i})">${opt.t}</div>`).join('')}
    <button class="btn-next" id="nextBtn" onclick="nextQuestion()" disabled>Lanjut ➡️</button></div>
  `;
}

function selectOption(value, i) {
  selectedAnswer = value;
  document.querySelectorAll('.option').forEach((el, idx) => {
    el.classList.remove('selected');
    if(idx === i) el.classList.add('selected');
  });
  document.getElementById('nextBtn').disabled = false;
}

function nextQuestion() {
  answers[selectedAnswer]++; selectedAnswer = null; currentQ++;
  if(currentQ < questions.length) renderQuestion();
  else showResult();
}

function showResult() {
  const name = document.getElementById('userName').value || "Kamu";

  const EI = answers.E > answers.I? 'E' : 'I';
  const TF = answers.T > answers.F? 'T' : 'F';
  const JP = answers.J > answers.P? 'J' : 'P';
  const type = EI + TF + JP;

  const data = types[type];

  const zodiaks = ["♈ Aries","♉ Taurus","♊ Gemini","♋ Cancer","♌ Leo","♍ Virgo","♎ Libra","♏ Scorpio","♐ Sagittarius","♑ Capricorn","♒ Aquarius","♓ Pisces"];
  const zodiak = zodiaks[Math.floor(Math.random()*12)];

  document.getElementById('character').innerText = data.emoji;
  document.getElementById('resultType').innerText = type;
  document.getElementById('resultName').innerText = data.name;
  document.getElementById('resultDesc').innerText = data.desc.replace("[NAMA]", name);
  document.getElementById('resultTrait').innerText = data.trait;
  document.getElementById('resultZodiak').innerText = zodiak;
  document.getElementById('resultTips').innerText = data.tips.replace("[NAMA]", name);
  document.getElementById('quoteText').innerText = `"${data.quote}"`;

  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('resultBox').classList.add('active');
  createConfetti();
}

function shareWA() {
  const type = document.getElementById('resultType').innerText;
  const quote = document.getElementById('quoteText').innerText;
  window.open(`https://wa.me/?text=${encodeURIComponent(`Aku ${type}! ${quote} Tes juga yuk 😆`)}`);
}

function restartQuiz() {
  currentQ = 0; answers = {E:0,I:0,T:0,F:0,J:0,P:0};
  document.getElementById('quizArea').style.display = 'block';
  document.getElementById('resultBox').classList.remove('active');
  renderQuestion();
}

renderQuestion();
</script>

</body>
</html>
